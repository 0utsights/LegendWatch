pluginManagement {
    repositories {
        maven {
            name = 'Fabric'
            url = 'https://maven.fabricmc.net/'
        }
        maven {
            name = 'Kikugie'
            url = 'https://maven.kikugie.dev/releases'
        }
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id 'dev.kikugie.stonecutter' version '0.5.2'
}

stonecutter {
    centralScript = "build.gradle"
    create(rootProject) {
        versions '1.21.11', '1.21.10', '1.21.9', '1.21.8', '1.20.4', '1.20.1', '1.19.4'
        vcsVersion = '1.21.11'
    }
}

rootProject.name = 'LegendWatch - Hoplite'
